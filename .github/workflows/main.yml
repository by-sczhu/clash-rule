name: MRS Ruleset Converter
on:
  push:
    paths:
      - 'Manual/Direct.yaml' # 只有当你修改这个文件时才运行
  workflow_dispatch:      # 允许你在 Actions 页面手动点运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Mihomo
        run: |
          # 获取最新版 Mihomo
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -L -o mihomo.tar.gz https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.tar.gz
          tar -xzf mihomo.tar.gz
          chmod +x mihomo

      - name: Convert YAML to MRS
        run: |
          # 执行转换 (text 代表输入的 yaml 格式)
          ./mihomo convert-ruleset text Manual/Direct.yaml Manual/Direct.mrs

      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Manual/Direct.mrs
          # 只有在文件有变动时才提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update Direct.mrs" && git push)

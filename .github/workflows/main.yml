name: Convert Ruleset to MRS
on:
  push:
    paths:
      - 'Manual/*.yaml'  # 监控 Manual 文件夹下所有 yaml 变动
  workflow_dispatch:      # 允许手动点击运行

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        run: |
          # 获取最新版 Mihomo 核心
          RELEASE_JSON=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url": "\K[^"]*linux-amd64[^"]*.gz' | head -n 1)
          curl -L -o mihomo.tar.gz "$DOWNLOAD_URL"
          tar -xzf mihomo.tar.gz
          # 重命名解压出的文件为 mihomo (由于版本号不同，通过通配符匹配)
          mv mihomo-linux-amd64* mihomo 2>/dev/null || true
          chmod +x mihomo

      - name: Batch Convert YAML to MRS
        run: |
          # 遍历 Manual 文件夹下所有 yaml 文件并转换
          for file in Manual/*.yaml; do
            filename=$(basename "$file" .yaml)
            echo "Converting $filename.yaml to $filename.mrs..."
            ./mihomo convert-ruleset text "$file" "Manual/$filename.mrs"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Manual/*.mrs
          # 仅在有变动时提交
          if ! git diff --staged --quiet; then
            git commit -m "auto: update mrs rulesets"
            git push
          else
            echo "No changes to commit"
          fi

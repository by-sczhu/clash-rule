name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> 正在获取下载链接..."
          # 使用 API 寻找最新版本中包含 linux-amd64 且以 .tar.gz 结尾的第一个资源
          DOWNLOAD_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | \
            jq -r '.assets[] | select(.name | contains("linux-amd64") and endswith(".tar.gz")) | .browser_download_url' | head -n 1)
          
          echo ">>> 正在下载: $DOWNLOAD_URL"
          curl -L -o mihomo.tar.gz "$DOWNLOAD_URL"
          
          echo ">>> 正在解压..."
          tar -xzf mihomo.tar.gz
          
          echo ">>> 准备二进制文件..."
          # 提取解压出来的二进制文件
          mv mihomo-linux-amd64* mihomo 2>/dev/null || mv mihomo mihomo_bin 2>/dev/null || true
          # 这里的逻辑是为了兼容不同的压缩包结构
          [ -f "mihomo" ] || find . -maxdepth 1 -type f -name "mihomo*" ! -name "*.tar.gz" -exec mv {} ./mihomo \;
          
          chmod +x ./mihomo
          ./mihomo -v

      - name: Batch Convert Rulesets
        run: |
          # 自动识别 Manual 目录（兼容大小写）
          TARGET_DIR="Manual"
          [ -d "$TARGET_DIR" ] || TARGET_DIR="manual"
          
          if [ ! -d "$TARGET_DIR" ]; then
            echo "错误：未发现 Manual 目录！当前目录结构如下："
            ls -R
            exit 1
          fi

          echo ">>> 正在转换 $TARGET_DIR 目录下的规则..."
          for file in "$TARGET_DIR"/*.yaml; do
            [ -e "$file" ] || continue
            filename="${file%.yaml}"
            echo "转换中: $file -> $filename.mrs"
            ./mihomo convert-ruleset text "$file" "$filename.mrs"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --cached --quiet; then
            echo ">>> 无变动，跳过推送。"
          else
            echo ">>> 发现变动，正在推送..."
            git commit -m "auto: update ruleset [skip ci]"
            git push
          fi

name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> 正在通过官方渠道下载 Mihomo..."
          # 自动寻找最新 Release 并下载匹配 linux-amd64 且以 .tar.gz 结尾的文件
          gh release download --repo MetaCubeX/mihomo --pattern "*linux-amd64*tar.gz" --limit 1
          
          echo ">>> 正在解压..."
          # 使用通配符解压下载到的文件
          tar -xzf *.tar.gz
          
          echo ">>> 准备二进制文件..."
          # 找到那个不带 .tar.gz 后缀的可执行文件并改名
          find . -maxdepth 1 -type f -name "mihomo*" ! -name "*.tar.gz" -exec mv {} ./mihomo \;
          chmod +x ./mihomo
          ./mihomo -v

      - name: Batch Convert Rulesets
        run: |
          # 定位目录
          TARGET_DIR="Manual"
          if [ ! -d "$TARGET_DIR" ]; then TARGET_DIR="manual"; fi
          
          if [ ! -d "$TARGET_DIR" ]; then
            echo "错误：未发现 Manual 或 manual 目录！"
            exit 1
          fi

          echo ">>> 正在转换 $TARGET_DIR 目录下的规则..."
          for file in "$TARGET_DIR"/*.yaml; do
            [ -e "$file" ] || continue
            filename="${file%.yaml}"
            echo "转换中: $file -> $filename.mrs"
            ./mihomo convert-ruleset text "$file" "$filename.mrs"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --cached --quiet; then
            echo ">>> 无变动，跳过推送。"
          else
            echo ">>> 发现变动，正在推送..."
            git commit -m "auto: update ruleset [skip ci]"
            git push
          fi

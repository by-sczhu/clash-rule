name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # 使用包含 Mihomo 的 Docker 环境，这样就不用下载内核了
    container:
      image: metacubex/mihomo:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Batch Convert Rulesets
        run: |
          # 检查目录
          TARGET_DIR="Manual"
          [ -d "$TARGET_DIR" ] || TARGET_DIR="manual"
          
          if [ ! -d "$TARGET_DIR" ]; then
            echo "错误：找不到 Manual 文件夹"
            exit 1
          fi

          echo "正在转换规则..."
          for file in "$TARGET_DIR"/*.yaml; do
            [ -e "$file" ] || continue
            filename="${file%.yaml}"
            # 在容器内直接调用 mihomo
            mihomo convert-ruleset text "$file" "$filename.mrs"
          done

      - name: Commit and Push Changes
        # 注意：在容器中运行 git 需要重新配置环境，这里我们用回主机环境
        uses: actions/checkout@v4 # 重新同步
        
      - name: Push results
        run: |
          # 因为容器环境和主机环境不同，我们直接在主机端处理提交
          # 我们在之前的步骤已经生成了文件，现在只需提交
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Manual/*.mrs 2>/dev/null || git add manual/*.mrs 2>/dev/null
          
          if git diff --cached --quiet; then
            echo "没有发现变动"
          else
            git commit -m "auto: update mrs rulesets [skip ci]"
            git push
          fi

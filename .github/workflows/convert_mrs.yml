name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        run: |
          echo ">>> 正在下载 Mihomo 内核..."
          curl -L -o mihomo.tar.gz "https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.tar.gz"
          
          echo ">>> 正在解压并列出文件..."
          tar -xzf mihomo.tar.gz
          ls -R # 调试：列出解压后的所有文件
          
          echo ">>> 寻找并重命名执行文件..."
          # 更加稳健的寻找方式
          find . -name "mihomo-linux-amd64*" -exec mv {} ./mihomo \;
          chmod +x ./mihomo
          
          echo ">>> 验证内核是否可用..."
          ./mihomo -v

      - name: Batch Convert Rulesets
        run: |
          echo ">>> 检查 Manual 目录是否存在..."
          # 自动兼容大小写问题
          TARGET_DIR=""
          if [ -d "Manual" ]; then TARGET_DIR="Manual"; elif [ -d "manual" ]; then TARGET_DIR="manual"; fi
          
          if [ -z "$TARGET_DIR" ]; then
            echo "错误：找不到 Manual 或 manual 文件夹！"
            ls -F # 调试：列出根目录所有内容
            exit 1
          fi

          echo ">>> 开始在 $TARGET_DIR 目录下转换..."
          for file in $TARGET_DIR/*.yaml; do
            if [ -f "$file" ]; then
              filename="${file%.yaml}"
              echo "转换: $file -> $filename.mrs"
              # 使用完整路径防止出错
              ./mihomo convert-ruleset text "$file" "$filename.mrs"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --cached --quiet; then
            echo ">>> 无变动。"
          else
            git commit -m "auto: update mrs [skip ci]"
            git push
          fi

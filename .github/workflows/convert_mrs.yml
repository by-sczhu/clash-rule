name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "正在使用 GitHub 官方工具下载 Mihomo..."
          # 使用 gh 官方工具直接下载最新 Release 中的 linux-amd64 压缩包
          # 这种方式不依赖拼凑 URL，最稳健
          gh release download --repo MetaCubeX/mihomo --pattern "*linux-amd64*tar.gz" --limit 1
          
          # 确认文件下载成功
          ls -lh *.tar.gz
          
          # 解压并寻找二进制文件
          tar -xzf *.tar.gz
          find . -maxdepth 1 -type f -name "mihomo*" ! -name "*.tar.gz" -exec mv {} mihomo \;
          chmod +x ./mihomo
          ./mihomo -v

      - name: Batch Convert Rulesets
        run: |
          # 确保进入工作目录并遍历 Manual 下的 yaml
          for file in Manual/*.yaml; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .yaml)
            echo "正在转换: $filename.yaml -> $filename.mrs"
            ./mihomo convert-ruleset text "$file" "Manual/$filename.mrs"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Manual/*.mrs
          if git diff --staged --quiet; then
            echo "无内容变动，跳过推送。"
          else
            git commit -m "auto: 自动更新二进制规则集 [skip ci]"
            git push
          fi

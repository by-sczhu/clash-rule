name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "尝试通过 GitHub API 获取最新版本..."
          # 尝试获取最新链接
          DOWNLOAD_URL=$(gh release view --repo MetaCubeX/mihomo --json assets \
            -q '.assets[] | select(.name | contains("linux-amd64") and endswith(".tar.gz")) | .browser_download_url' | head -n 1)
          
          # 如果 API 获取失败，则使用手动指定的稳定版（兜底方案）
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "API 响应超时或为空，切换到兜底下载链接..."
            DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.tar.gz"
          fi

          echo "正在从 $DOWNLOAD_URL 下载..."
          curl -L -o mihomo.tar.gz "$DOWNLOAD_URL"
          
          # 解压并寻找二进制文件
          tar -xzf mihomo.tar.gz
          find . -maxdepth 1 -type f -name "mihomo*" ! -name "*.tar.gz" -exec mv {} mihomo \;
          chmod +x mihomo
          ./mihomo -v

      - name: Batch Convert Rulesets
        run: |
          for file in Manual/*.yaml; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .yaml)
            echo "正在转换: $filename.yaml -> $filename.mrs"
            ./mihomo convert-ruleset text "$file" "Manual/$filename.mrs"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Manual/*.mrs
          if git diff --staged --quiet; then
            echo "无内容变动。"
          else
            git commit -m "auto: update mrs rulesets [skip ci]"
            git push
          fi

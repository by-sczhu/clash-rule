name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        run: |
          echo ">>> 正在下载 Mihomo 内核..."
          # 使用 --connect-timeout 防止卡死
          curl -L --connect-timeout 10 -o mihomo.tar.gz "https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.tar.gz"
          
          echo ">>> 正在解压..."
          tar -xzf mihomo.tar.gz
          
          # 自动寻找解压出来的执行文件（处理可能的版本号后缀）
          EXECUTABLE=$(find . -name "mihomo-linux-amd64*" | head -n 1)
          mv "$EXECUTABLE" ./mihomo
          chmod +x ./mihomo
          echo ">>> 内核准备就绪:"
          ./mihomo -v

      - name: Batch Convert Rulesets
        run: |
          echo ">>> 开始批量转换 Manual 目录下的规则..."
          # 直接在当前路径执行，使用相对路径调用内核
          for file in Manual/*.yaml; do
            if [ -f "$file" ]; then
              filename="${file%.yaml}"
              echo "转换: $file -> $filename.mrs"
              ./mihomo convert-ruleset text "$file" "$filename.mrs"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Manual/*.mrs
          # 检查暂存区是否有变化
          if git diff --cached --quiet; then
            echo ">>> 无内容更新，跳过提交。"
          else
            echo ">>> 正在提交更新到仓库..."
            git commit -m "auto: 自动更新二进制规则集 [skip ci]"
            git push
          fi

name: MRS Ruleset Converter

on:
  push:
    paths:
      - 'Manual/*.yaml'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Mihomo
        run: |
          echo "开始下载 Mihomo..."
          # 直接使用 MetaCubeX 官方固定的最新版跳转链接，速度最快
          curl -L -o mihomo.tar.gz "https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.tar.gz"
          
          echo "正在解压..."
          tar -xzf mihomo.tar.gz
          
          echo "重命名二进制文件..."
          # 这样写可以无视版本号，直接抓取解压出来的那个可执行文件
          mv mihomo-linux-amd64* mihomo
          chmod +x ./mihomo
          
          echo "当前 Mihomo 版本:"
          ./mihomo -v

      - name: Batch Convert Rulesets
        run: |
          echo "进入 Manual 文件夹转换..."
          cd Manual
          for file in *.yaml; do
            [ -e "$file" ] || continue
            filename="${file%.yaml}"
            echo "转换中: $file -> $filename.mrs"
            ../mihomo convert-ruleset text "$file" "$filename.mrs"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Manual/*.mrs
          if git diff --staged --quiet; then
            echo "检查结果：没有文件发生变动。"
          else
            echo "发现变动，正在推送..."
            git commit -m "auto: 自动更新二进制规则集 [skip ci]"
            git push
          fi
